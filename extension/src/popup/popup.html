<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>Callwen</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Auth gate -->
    <div id="auth-screen" class="screen hidden">
      <div class="logo-section">
        <h1 class="logo">Callwen</h1>
        <p class="tagline">Capture for Advisory</p>
      </div>
      <button id="sign-in-btn" class="btn btn-primary btn-full">Sign in to Callwen</button>
    </div>

    <!-- Main screen -->
    <div id="main-screen" class="screen hidden">
      <header class="header">
        <h1 class="logo-sm">Callwen</h1>
        <button id="sign-out-btn" class="btn-icon" title="Sign out">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
          </svg>
        </button>
      </header>

      <!-- Capture actions -->
      <div class="section">
        <label class="label">Client</label>
        <select id="client-select" class="select">
          <option value="">Select a client...</option>
        </select>
      </div>

      <div class="section">
        <label class="label">Document type</label>
        <select id="tag-select" class="select">
          <option value="other">Other</option>
        </select>
      </div>

      <div class="capture-actions">
        <button id="capture-selection" class="btn btn-capture" title="Capture selected text">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 7V4h3M20 7V4h-3M4 17v3h3M20 17v3h-3"/>
          </svg>
          Selection
        </button>
        <button id="capture-page" class="btn btn-capture" title="Capture full page text">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
          </svg>
          Full Page
        </button>
        <button id="capture-screenshot" class="btn btn-capture" title="Capture screenshot">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
          </svg>
          Screenshot
        </button>
      </div>

      <!-- Status -->
      <div id="status" class="status hidden"></div>

      <!-- Usage info -->
      <div id="usage" class="usage hidden">
        <span id="usage-text"></span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
