# Alembic configuration file
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts, relative to this file
script_location = alembic

# Add the project root to sys.path so `app.*` imports work inside env.py
prepend_sys_path = .

# Filename template for new migration scripts
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for file_template timestamps
timezone = UTC

# sqlalchemy.url is overridden in env.py from the DATABASE_URL env variable.
# The value here is a placeholder so Alembic doesn't error on startup.
sqlalchemy.url = postgresql://localhost/advisoryboard_dev

[post_write_hooks]
# Uncomment to auto-format generated migration files:
# hooks = ruff_format
# ruff_format.type = exec
# ruff_format.executable = ruff
# ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
